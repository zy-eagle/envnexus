apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-job-runner
  labels:
    app.kubernetes.io/name: job-runner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount.jobRunner }}
  selector:
    matchLabels:
      app.kubernetes.io/name: job-runner
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: job-runner
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "envnexus.serviceAccountName" . }}
      containers:
        - name: job-runner
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/job-runner:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.jobRunner.port }}
          env:
            - name: ENX_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-dsn
            - name: ENX_OBJECT_STORAGE_ENDPOINT
              value: {{ .Values.minio.endpoint | quote }}
            - name: ENX_OBJECT_STORAGE_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: ENX_LOG_LEVEL
              value: {{ .Values.env.ENX_LOG_LEVEL | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources.jobRunner | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-job-runner
spec:
  type: {{ .Values.service.jobRunner.type }}
  ports:
    - port: {{ .Values.service.jobRunner.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: job-runner
    app.kubernetes.io/instance: {{ .Release.Name }}
