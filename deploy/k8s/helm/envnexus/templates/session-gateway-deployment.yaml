apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-session-gateway
  labels:
    app.kubernetes.io/name: session-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount.sessionGateway }}
  selector:
    matchLabels:
      app.kubernetes.io/name: session-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: session-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "envnexus.serviceAccountName" . }}
      containers:
        - name: session-gateway
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/session-gateway:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.sessionGateway.port }}
          env:
            - name: ENX_SESSION_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: session-token-secret
            - name: ENX_HTTP_PORT
              value: {{ .Values.service.sessionGateway.port | quote }}
            - name: ENX_REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-addr
            - name: ENX_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-password
            - name: ENX_CORS_ALLOWED_ORIGINS
              value: {{ .Values.env.ENX_CORS_ALLOWED_ORIGINS | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources.sessionGateway | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-session-gateway
  labels:
    app.kubernetes.io/name: session-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.sessionGateway.type }}
  ports:
    - port: {{ .Values.service.sessionGateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: session-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
