apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-platform-api
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: {{ .Values.replicaCount.platformApi }}
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "envnexus.serviceAccountName" . }}
      containers:
        - name: platform-api
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}/platform-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.platformApi.port }}
          env:
            - name: ENX_DATABASE_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-dsn
            - name: ENX_REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: redis-addr
            - name: ENX_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
            - name: ENX_DEVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: device-secret
            - name: ENX_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: session-secret
            - name: ENX_OBJECT_STORAGE_ENDPOINT
              value: {{ .Values.minio.endpoint | quote }}
            - name: ENX_OBJECT_STORAGE_BUCKET
              value: {{ .Values.minio.bucket | quote }}
            - name: ENX_LOG_LEVEL
              value: {{ .Values.env.ENX_LOG_LEVEL | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources.platformApi | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-platform-api
  labels:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.platformApi.type }}
  ports:
    - port: {{ .Values.service.platformApi.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: platform-api
    app.kubernetes.io/instance: {{ .Release.Name }}
