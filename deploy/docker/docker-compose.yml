services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-envnexus}
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set enx http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing enx/$${ENX_OBJECT_STORAGE_BUCKET:-envnexus};
      echo 'Bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ENX_OBJECT_STORAGE_BUCKET: ${ENX_OBJECT_STORAGE_BUCKET:-envnexus}
    restart: "no"

  agent-builder:
    build:
      context: ../..
      dockerfile: deploy/docker/agent-builder.Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      ENX_OBJECT_STORAGE_ENDPOINT: minio:9000
      ENX_OBJECT_STORAGE_BUCKET: ${ENX_OBJECT_STORAGE_BUCKET:-envnexus}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      FORCE_UPLOAD: ${FORCE_AGENT_UPLOAD:-false}
    restart: "no"

  platform-api:
    build:
      context: ../..
      dockerfile: deploy/docker/platform-api.Dockerfile
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${ENX_PLATFORM_API_PORT:-8080}:${ENX_HTTP_PORT:-8080}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  session-gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/session-gateway.Dockerfile
    env_file:
      - .env
    environment:
      # session-gateway uses ENX_HTTP_PORT; shared .env sets it for platform-api (8080).
      ENX_HTTP_PORT: ${ENX_SESSION_GATEWAY_PORT:-8081}
    depends_on:
      platform-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${ENX_SESSION_GATEWAY_PORT:-8081}:${ENX_SESSION_GATEWAY_PORT:-8081}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ENX_SESSION_GATEWAY_PORT:-8081}/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  job-runner:
    build:
      context: ../..
      dockerfile: deploy/docker/job-runner.Dockerfile
    env_file:
      - .env
    depends_on:
      platform-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      agent-builder:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ENX_HEALTH_PORT:-8082}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  console-web:
    build:
      context: ../..
      dockerfile: deploy/docker/console-web.Dockerfile
      args:
        API_PROXY_TARGET: http://platform-api:8080
    env_file:
      - .env
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "${ENX_CONSOLE_PORT:-3000}:3000"
