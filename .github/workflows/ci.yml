name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint-build-test:
    name: Go Lint / Build / Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - services/platform-api
          - services/session-gateway
          - services/job-runner
          - apps/agent-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
        env:
          GOWORK: "off"

      - name: Go build
        working-directory: ${{ matrix.module }}
        run: go build ./...
        env:
          GOWORK: "off"

      - name: Go test
        working-directory: ${{ matrix.module }}
        run: go test -race -coverprofile=coverage.out ./...
        env:
          GOWORK: "off"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ hashFiles(format('{0}/go.mod', matrix.module)) }}
          path: ${{ matrix.module }}/coverage.out

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/console-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
