app:
  name: job-runner
  env: local
  log_level: info

database:
  dsn: ${ENX_DATABASE_DSN}
  max_open_conns: 10
  max_idle_conns: 5

redis:
  addr: ${ENX_REDIS_ADDR}

object_storage:
  endpoint: ${ENX_OBJECT_STORAGE_ENDPOINT}
  bucket: ${ENX_OBJECT_STORAGE_BUCKET}

platform_api:
  base_url: http://platform-api:8080
  internal_token: ${ENX_INTERNAL_TOKEN}
