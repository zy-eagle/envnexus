app:
  name: job-runner
  env: local
  log_level: info

database:
  dsn: ${ENX_DATABASE_DSN}
  max_open_conns: 10
  max_idle_conns: 5

health:
  port: ${ENX_HEALTH_PORT}

object_storage:
  endpoint: ${ENX_OBJECT_STORAGE_ENDPOINT}
  bucket: ${ENX_OBJECT_STORAGE_BUCKET}

package_build:
  platform_url: ${ENX_PLATFORM_URL}
  ws_url: ${ENX_WS_URL}
