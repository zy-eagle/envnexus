<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EnvNexus Agent</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background: #f9fafb; color: #333; }
        h1 { color: #111; }
        .card { background: white; border: 1px solid #e5e7eb; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .card h2 { margin-top: 0; font-size: 1.2rem; }
        .btn { padding: 8px 16px; margin-right: 10px; cursor: pointer; border-radius: 4px; font-weight: 500; font-size: 14px; }
        .btn-approve { background: #10b981; color: white; border: 1px solid #059669; }
        .btn-approve:hover { background: #059669; }
        .btn-deny { background: #ef4444; color: white; border: 1px solid #dc2626; }
        .btn-deny:hover { background: #dc2626; }
        pre { background: #f3f4f6; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>EnvNexus Local Agent</h1>
    
    <div class="card">
        <h2>Device Status</h2>
        <pre id="status">Loading...</pre>
    </div>

    <div class="card">
        <h2>Pending Approvals</h2>
        <div id="approvals">
            <p style="color: #6b7280;">No pending approvals.</p>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await window.electronAPI.getAgentStatus();
                document.getElementById('status').innerText = JSON.stringify(res, null, 2);
            } catch (e) {
                document.getElementById('status').innerText = 'Error: ' + e.message;
            }
        }

        async function fetchApprovals() {
            try {
                const res = await fetch('http://127.0.0.1:17700/local/v1/approvals/pending');
                const data = await res.json();
                const container = document.getElementById('approvals');
                
                if (!data.pending_approvals || data.pending_approvals.length === 0) {
                    container.innerHTML = '<p style="color: #6b7280;">No pending approvals.</p>';
                    return;
                }

                container.innerHTML = ''; // clear
                data.pending_approvals.forEach(app => {
                    const div = document.createElement('div');
                    div.style.border = '1px solid #e5e7eb';
                    div.style.padding = '10px';
                    div.style.marginTop = '10px';
                    div.style.borderRadius = '4px';
                    div.innerHTML = `
                        <h3 style="margin-top:0;">Action Required: <code>${app.ToolName}</code></h3>
                        <p style="font-size: 0.9rem; color: #4b5563;">ID: ${app.ID}</p>
                        <p style="font-size: 0.9rem; color: #4b5563;">Status: ${app.Status}</p>
                        <div style="margin-top: 10px;">
                            <button class="btn btn-approve" onclick="resolveApproval('${app.ID}', true)">Approve</button>
                            <button class="btn btn-deny" onclick="resolveApproval('${app.ID}', false)">Deny</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                console.error('Failed to fetch approvals', e);
            }
        }

        async function resolveApproval(id, approved) {
            try {
                await fetch(`http://127.0.0.1:17700/local/v1/approvals/${id}/resolve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved })
                });
                fetchApprovals();
            } catch (e) {
                alert('Failed to resolve approval: ' + e.message);
            }
        }

        // Expose to window so inline onclick works
        window.resolveApproval = resolveApproval;

        fetchStatus();
        fetchApprovals();
        setInterval(fetchApprovals, 3000); // Poll every 3 seconds
    </script>
</body>
</html>
